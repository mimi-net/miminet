<script id="config_textbox_main_form_script" type="text/plain">
    <form id='config_textbox_main_form' action='/host/textbox_save_config' method='POST'>
        <input type="hidden" id="textbox_id" name="textbox_id" value=""/>
        <input type="hidden" id="net_guid" name="net_guid" value=""/>
        <button id="config_textbox_end_form" type="submit" style="display: none;"></button>
    </form>
</script>

<script id="config_textbox_save_script" type="text/plain">
    <button id="config_textbox_main_form_submit_button" type="submit" class="btn btn-success w-100">Сохранить</button>
</script>

<script id="config_textbox_content_script" type="text/plain">
    <div class="form-group pb-2">
        <label for="config_textbox_content" class="text-lg">Текст</label>
        <textarea class="form-control form-control-sm" id="config_textbox_content" name="config_textbox_content" rows="3" maxlength="128"></textarea>
    </div>
</script>

<script id="config_textbox_font_color_script" type="text/plain">
    <div class="form-group pb-2">
        <label for="config_textbox_font_color" class="text-sm">Цвет текста</label>
        <div class="d-flex justify-content-between mb-2 gap-1">
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #000000; width: 24px; height: 24px; cursor: pointer;" data-color="#000000" title="Black"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #dc3545; width: 24px; height: 24px; cursor: pointer;" data-color="#dc3545" title="Red"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #0d6efd; width: 24px; height: 24px; cursor: pointer;" data-color="#0d6efd" title="Blue"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #198754; width: 24px; height: 24px; cursor: pointer;" data-color="#198754" title="Green"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #ffc107; width: 24px; height: 24px; cursor: pointer;" data-color="#ffc107" title="Yellow"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #fd7e14; width: 24px; height: 24px; cursor: pointer;" data-color="#fd7e14" title="Orange"></div>
            <div class="color-preset rounded-circle border shadow-sm" style="background-color: #6c757d; width: 24px; height: 24px; cursor: pointer;" data-color="#6c757d" title="Gray"></div>
            <div class="custom-color-wrapper position-relative rounded-circle border shadow-sm" style="background: conic-gradient(red, orange, yellow, lime, blue, magenta, red); width: 24px; height: 24px; cursor: pointer; overflow: hidden;" title="Custom">
                <input type="color" class="position-absolute w-100 h-100 start-0 top-0" id="config_textbox_font_color" name="config_textbox_font_color" value="#000000" style="opacity: 0; cursor: pointer; border: none; padding: 0;">
            </div>
        </div>
    </div>
</script>

<script id="config_textbox_font_controls_script" type="text/plain">
    <div class="form-group pb-2">
        <label class="text-sm">Шрифт</label>
        <div class="d-flex align-items-center justify-content-between gap-2">
            <div style="flex: 1;">
                <input type="number" class="form-control form-control-sm" id="config_textbox_font_size" name="config_textbox_font_size" value='' max="120" min="8" placeholder="Размер">
            </div>

            <input type="hidden" id="config_textbox_font_style" name="config_textbox_font_style" value="normal">
            <div>
                <button type="button" class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center" id="btn_toggle_style" title="Курсив" style="width: 32px; height: 31px;">
                    <i class="bx bx-italic fs-6"></i>
                </button>
            </div>

            <input type="hidden" id="config_textbox_font_weight" name="config_textbox_font_weight" value="normal">
            <div>
                 <button type="button" class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center" id="btn_toggle_weight" title="Жирный" style="width: 32px; height: 31px;">
                    <i class="bx bx-bold fs-6"></i>
                </button>
            </div>
        </div>
    </div>
</script>
